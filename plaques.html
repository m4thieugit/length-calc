<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculateur de plaques</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#f0f4fb;
  --surface:#ffffff;
  --surface2:#f7f9fd;
  --border:#dde5f4;
  --border2:#c8d6ef;
  --accent:#1a56db;
  --accent-light:#e8effd;
  --accent-mid:#4a7fe8;
  --warn:#e05c3a;
  --warn-dim:rgba(224,92,58,0.08);
  --text:#0d1a35;
  --muted:#8096bb;
  --muted2:#a0b0cc;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Raleway',sans-serif;
  font-weight:400;
  min-height:100vh;
}
body::before{
  content:'';
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  background-image:radial-gradient(circle at 1px 1px, rgba(26,86,219,0.06) 1px, transparent 0);
  background-size:28px 28px;
}
.page{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;min-height:100vh;}

header{
  border-bottom:1px solid var(--border);
  padding:14px 26px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 12px rgba(26,86,219,0.07);
}
.logo{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;min-width:0;}
.logo h1{
  font-size:15px;
  font-weight:400;
  letter-spacing:0.05em;
  color:var(--text);
  white-space:nowrap;
}
.logo h1 em{font-style:normal;color:var(--accent);font-weight:600;}
.logo-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:3px;
  color:var(--muted);text-transform:uppercase;
  font-weight:300;
}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
@media(max-width:600px){
  header{padding:12px 16px;gap:8px;}
  .logo h1{font-size:12px;letter-spacing:0;}
  .logo-sub{display:none;}
  .hbadge{display:none;}
}
.hbadge{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;
  color:var(--accent);
  border:1px solid var(--border2);
  background:var(--accent-light);
  padding:4px 10px;border-radius:20px;
  text-transform:uppercase;font-weight:400;
}
.pdf-btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;
  color:#fff;background:var(--accent);
  border:none;padding:6px 14px;border-radius:20px;
  text-transform:uppercase;cursor:pointer;font-weight:400;
  transition:all .2s;display:none;
  box-shadow:0 2px 10px rgba(26,86,219,0.3);
}
.pdf-btn:hover{background:var(--accent-mid);box-shadow:0 4px 16px rgba(26,86,219,0.4);transform:translateY(-1px);}
.pdf-btn.visible{display:block;}

.main{display:grid;grid-template-columns:370px 1fr;min-height:calc(100vh - 57px);}
@media(max-width:960px){
  .main{grid-template-columns:1fr;min-height:unset;}
}

.sidebar{
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;
  max-height:calc(100vh - 57px);
  position:sticky;top:57px;
  background:var(--surface);
}
@media(max-width:960px){
  .sidebar{
    position:static;
    max-height:none;
    overflow-y:visible;
    border-right:none;
    border-bottom:1px solid var(--border);
  }
}
.sb-sec{border-bottom:1px solid var(--border);padding:16px 18px;}

.slabel{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:12px;
  display:flex;align-items:center;gap:9px;
  font-weight:400;
}
.slabel::after{content:'';flex:1;height:1px;background:var(--border);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}

.field{display:flex;flex-direction:column;gap:5px;}
.field label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;font-weight:400;
}
.field input{
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:400;
  padding:8px 10px;border-radius:6px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(26,86,219,0.1);
  background:#fff;
}
.field input::placeholder{color:var(--muted2);font-size:11px;}
.field-note{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;color:var(--accent-mid);margin-top:1px;font-weight:300;
}

.visuels-list{display:flex;flex-direction:column;gap:7px;}
.vrow{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  transition:box-shadow .2s;
}
.vrow:hover{box-shadow:0 2px 12px rgba(26,86,219,0.1);}
.vrow-head{display:flex;align-items:center;padding:8px 10px;gap:8px;}
.vdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.vname{
  flex:1;background:transparent;border:none;
  color:var(--text);
  font-family:'Raleway',sans-serif;
  font-size:12px;font-weight:500;
  outline:none;cursor:pointer;min-width:0;
}
.vname:focus{cursor:text;}
.vsummary{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted2);white-space:nowrap;font-weight:400;
}
.vdel{
  background:none;border:none;color:var(--muted2);
  cursor:pointer;font-size:11px;
  padding:3px 6px;border-radius:4px;
  transition:color .15s,background .15s;flex-shrink:0;
}
.vdel:hover{color:var(--warn);background:var(--warn-dim);}
.vfields{padding:8px 10px 11px;border-top:1px solid var(--border);}

.add-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:9px;
  background:transparent;
  border:1.5px dashed var(--border2);
  color:var(--muted);
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:1px;
  cursor:pointer;border-radius:8px;
  transition:all .2s;margin-top:7px;font-weight:400;
}
.add-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--accent-light);
}

.calc-btn{
  margin:14px 18px 18px;
  padding:13px;
  background:var(--accent);
  color:#fff;border:none;
  font-family:'Raleway',sans-serif;
  font-weight:500;font-size:11px;
  letter-spacing:4px;text-transform:uppercase;
  cursor:pointer;border-radius:8px;
  transition:all .2s;
  box-shadow:0 3px 14px rgba(26,86,219,0.3);
}
.calc-btn:hover{
  background:var(--accent-mid);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(26,86,219,0.4);
}
.calc-btn:active{transform:none;}

.content{overflow-y:auto;padding:24px 28px;}
@media(max-width:600px){.content{padding:16px;}}

.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;min-height:400px;
  color:var(--muted2);gap:12px;
}
.empty-icon{font-size:48px;opacity:0.15;line-height:1;}
.empty p{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:3px;
  text-transform:uppercase;opacity:.5;font-weight:300;
}

.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:700px){.summary-bar{grid-template-columns:repeat(2,1fr);}}

.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
  box-shadow:0 1px 6px rgba(26,86,219,0.05);
  transition:box-shadow .2s;
}
.stat:hover{box-shadow:0 4px 16px rgba(26,86,219,0.1);}
.stat-val{
  font-size:22px;font-weight:300;
  letter-spacing:-0.5px;color:var(--accent);line-height:1;
}
.stat-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted2);
  margin-top:4px;font-weight:300;
}

.dims-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:10px;padding:14px 18px;margin-bottom:18px;
  display:flex;align-items:stretch;gap:10px 0;flex-wrap:wrap;
  box-shadow:0 1px 8px rgba(26,86,219,0.06);
}
.dims-block{padding:0 20px 0 0;}
.dims-block+.dims-block{border-left:1px solid var(--border);padding-left:20px;}
@media(max-width:600px){
  .dims-card{gap:14px 0;}
  .dims-block{padding:0;border-left:none!important;padding-left:0!important;width:50%;}
  .dims-note{margin-left:0;text-align:left;padding-left:0;width:100%;border-top:1px solid var(--border);padding-top:10px;margin-top:4px;}
}
.dims-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:4px;font-weight:300;
}
.dims-val{font-size:22px;font-weight:300;letter-spacing:-0.5px;color:var(--accent);line-height:1;}
.dims-unit{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted2);margin-left:3px;font-weight:300;
}
.dims-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted);margin-top:3px;font-weight:300;
}
.dims-note{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted);margin-left:auto;
  line-height:1.8;text-align:right;align-self:center;
  padding-left:14px;font-weight:400;
}

.breakdown{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;margin-bottom:22px;
  box-shadow:0 1px 6px rgba(26,86,219,0.05);
}
.breakdown-hdr{
  padding:9px 14px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.breakdown-title{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted);font-weight:300;
}
.breakdown-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

table{width:100%;border-collapse:collapse;}
th{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted2);padding:8px 12px;text-align:left;
  border-bottom:1px solid var(--border);white-space:nowrap;font-weight:300;
}
td{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--text);
  padding:8px 12px;border-bottom:1px solid var(--border);font-weight:400;
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--accent-light);}

.td-name{display:flex;align-items:center;gap:7px;}
.td-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.td-ok{color:#16a34a;}
.td-warn{color:var(--warn);}

.plates-sec-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px;
}
.plates-sec-title{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:3px;
  text-transform:uppercase;color:var(--muted2);font-weight:300;
}

.legend{display:flex;flex-wrap:wrap;gap:9px;}
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted);font-weight:400;
}
.legend-sw{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.hidden{display:none!important;}
</style>
</head>
<body>
<div class="page">
<header>
  <div class="logo">
    <h1>CALCUL DU NOMBRE DE <em>PLAQUES</em></h1>
    <span class="logo-sub">Dimensions fixes · plaques optimisées</span>
  </div>
  <div class="header-right">
    <button class="pdf-btn" id="pdf-btn" onclick="exportPDF()">⬇ Export PDF</button>
    <span class="hbadge">Bin Packing 2D</span>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sb-sec">
      <div class="slabel">Dimensions de la plaque</div>
      <div class="grid2">
        <div class="field">
          <label>Largeur mm</label>
          <input type="number" id="pW" value="3050" min="1">
          <div class="field-note">Largeur fixe</div>
        </div>
        <div class="field">
          <label>Longueur mm</label>
          <input type="number" id="pH" value="2050" min="1">
          <div class="field-note">Longueur fixe</div>
        </div>
      </div>
      <div style="margin-top:9px;">
        <div class="field">
          <label>Espacement mm</label>
          <input type="number" id="pGap" value="10" min="0">
          <div class="field-note">Marge entre les visuels</div>
        </div>
      </div>
    </div>
    <div class="sb-sec" style="flex:1;overflow-y:auto;">
      <div class="slabel">Visuels</div>
      <div class="visuels-list" id="visuels-list"></div>
      <button class="add-btn" onclick="addVisuel()">+ Ajouter un visuel</button>
    </div>
    <button class="calc-btn" onclick="calculate()">▶ CALCULER</button>
  </div>
  <div class="content">
    <div class="empty" id="empty-state">
      <div class="empty-icon">▦</div>
      <p>Configurez et calculez</p>
    </div>
    <div id="results" class="hidden"></div>
  </div>
</div>
</div>

<script>
const PDF_COLORS=[
  {fill:'#b8d4f0',stroke:'#2d5fa8'},{fill:'#b8e8cc',stroke:'#27854f'},
  {fill:'#f0b8d4',stroke:'#8a2760'},{fill:'#f0deb8',stroke:'#8a6e27'},
  {fill:'#b8dce8',stroke:'#27748a'},{fill:'#d8b8f0',stroke:'#6e278a'},
  {fill:'#f0ccb8',stroke:'#8a4427'},{fill:'#b8f0f0',stroke:'#27888a'},
  {fill:'#f0b8b8',stroke:'#8a2727'},{fill:'#b8f0b8',stroke:'#278a27'},
];

let visuels=[],nextId=1;
let lastResult=null; // {plates, pW}

/* ── UI ── */
function addVisuel(w=500,h=500,qty=1,name=null){
  const id=nextId++;
  const ci=visuels.length%PDF_COLORS.length;
  visuels.push({id,w,h,qty,colorIdx:ci,name:name||`Visuel #${id}`});
  renderSidebar();
}
function removeVisuel(id){
  visuels=visuels.filter(v=>v.id!==id);
  visuels.forEach((v,i)=>{v.colorIdx=i%PDF_COLORS.length;});
  renderSidebar();
}
function updateName(id,val){const v=visuels.find(x=>x.id===id);if(v)v.name=val||`Visuel #${id}`;}
function updateField(id,field,val){
  const v=visuels.find(x=>x.id===id);if(!v)return;
  const n=parseFloat(val);if(!isNaN(n)&&n>0)v[field]=n;
  const s=document.querySelector(`[data-vid="${id}"] .vsummary`);
  if(s)s.textContent=`${v.w}×${v.h} ×${v.qty}`;
}
function renderSidebar(){
  const list=document.getElementById('visuels-list');
  list.innerHTML='';
  visuels.forEach(v=>{
    const dot=PDF_COLORS[v.colorIdx].stroke;
    const row=document.createElement('div');
    row.className='vrow';row.dataset.vid=v.id;
    row.innerHTML=`
      <div class="vrow-head">
        <div class="vdot" style="background:${dot}"></div>
        <input class="vname" value="${v.name}" onchange="updateName(${v.id},this.value)" onclick="this.select()">
        <span class="vsummary">${v.w}×${v.h} ×${v.qty}</span>
        <button class="vdel" onclick="removeVisuel(${v.id})">✕</button>
      </div>
      <div class="vfields"><div class="grid3">
        <div class="field"><label>Larg. mm</label><input type="number" value="${v.w}" min="1" onchange="updateField(${v.id},'w',this.value)"></div>
        <div class="field"><label>Long. mm</label><input type="number" value="${v.h}" min="1" onchange="updateField(${v.id},'h',this.value)"></div>
        <div class="field"><label>Quantité</label><input type="number" value="${v.qty}" min="1" onchange="updateField(${v.id},'qty',this.value)"></div>
      </div></div>`;
    list.appendChild(row);
  });
}

/* ══════════════════════════════════════════════════════════════
   MOTEUR MAXRECTS COMMUN
   items  : [{w, h, ...meta}]  — déjà dans l'orientation voulue
   stripW : largeur fixe
   stripH : hauteur max (1e9 pour mode infini)
   Retourne : { placed:[{item,x,y,w,h,rot}], notPlaced:[item], usedLen }
   ══════════════════════════════════════════════════════════════ */
function maxRectsPass(items, stripW, stripH, gap=0){
  // On réduit la plaque d'un demi-gap sur chaque bord extérieur
  const G=gap;
  let free=[{x:0,y:0,w:stripW,h:stripH}];
  const placed=[], notPlaced=[];

  for(const item of items){
    // Dimensions avec gap ajouté (espace autour de chaque item)
    const iw=item.w+G, ih=item.h+G;
    const iwr=item.h+G, ihr=item.w+G;
    const orients=[];
    if(iw<=stripW && ih<=stripH) orients.push({w:iw,h:ih,rot:false});
    if(iwr<=stripW && ihr<=stripH && !(item.w===item.h))
      orients.push({w:iwr,h:ihr,rot:true});
    const seen=new Set();
    const uniq=orients.filter(o=>{const k=o.w+'x'+o.h;return seen.has(k)?false:(seen.add(k),true);});

    if(!uniq.length){notPlaced.push(item);continue;}

    let bx=-1,by=-1,bOri=null;
    for(const o of uniq){
      for(const r of free){
        if(o.w<=r.w && o.h<=r.h){
          if(by===-1 || r.y<by || (r.y===by && r.x<bx)){
            bx=r.x; by=r.y; bOri=o;
          }
        }
      }
    }

    if(bOri===null){notPlaced.push(item);continue;}

    // On stocke la position avec gap, mais les vraies dimensions sans gap pour l'affichage
    const realW=bOri.rot?item.h:item.w;
    const realH=bOri.rot?item.w:item.h;
    const p={item, x:bx, y:by, w:bOri.w, h:bOri.h, realW, realH, rot:bOri.rot};
    placed.push(p);

    const nf=[];
    for(const r of free){
      if(!(p.x<r.x+r.w && p.x+p.w>r.x && p.y<r.y+r.h && p.y+p.h>r.y)){
        nf.push(r); continue;
      }
      if(r.x<p.x)            nf.push({x:r.x,      y:r.y,      w:p.x-r.x,            h:r.h});
      if(r.x+r.w>p.x+p.w)   nf.push({x:p.x+p.w,  y:r.y,      w:r.x+r.w-p.x-p.w,   h:r.h});
      if(r.y<p.y)            nf.push({x:r.x,      y:r.y,      w:r.w,                 h:p.y-r.y});
      if(r.y+r.h>p.y+p.h)   nf.push({x:r.x,      y:p.y+p.h,  w:r.w,                 h:r.y+r.h-p.y-p.h});
    }
    free=nf.filter((a,i)=>!nf.some((b,j)=>i!==j&&a.x>=b.x&&a.y>=b.y&&a.x+a.w<=b.x+b.w&&a.y+a.h<=b.y+b.h)&&a.w>0&&a.h>0);
  }

  const usedLen=placed.length?Math.max(...placed.map(p=>p.y+p.h)):0;
  return {placed,notPlaced,usedLen};
}

/* ══════════════════════════════════════════════════════════════
   ALGORITHME 1 — MODE ROULEAU (longueur illimitée)
   On essaie plusieurs ordres de tri et on garde le strip
   avec la longueur utilisée la plus courte.
   ══════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════
   ALGORITHME — MODE PLAQUES (dimensions fixes)
   On découpe les visuels sur N plaques de taille pW × pH.
   On essaie plusieurs ordres de tri et on garde le moins de plaques.
   ══════════════════════════════════════════════════════════════ */
function modePlaques(items, stripW, stripH, gap=0){
  const tooBig=items.filter(it=>
    (it.w+gap>stripW || it.h+gap>stripH) && (it.h+gap>stripW || it.w+gap>stripH)
  );
  const valid=items.filter(it=>
    (it.w+gap<=stripW && it.h+gap<=stripH) || (it.h+gap<=stripW && it.w+gap<=stripH)
  );

  const SORTS=[
    a=>[...a].sort((x,y)=>Math.max(y.w,y.h)-Math.max(x.w,x.h)),
    a=>[...a].sort((x,y)=>y.w*y.h-x.w*x.h),
    a=>[...a].sort((x,y)=>y.w+y.h-x.w-x.h),
    a=>[...a].sort((x,y)=>Math.min(y.w,y.h)-Math.min(x.w,x.h)),
  ];

  let best=null;
  for(const sortFn of SORTS){
    const r=packOnPlaques(sortFn(valid), stripW, stripH, gap);
    if(!best||r.plates.length<best.plates.length||(r.plates.length===best.plates.length&&r.plates[r.plates.length-1]?.placed.length>best.plates[best.plates.length-1]?.placed.length))
      best=r;
  }

  return {
    plates: best.plates,
    unplaceable: tooBig
  };
}

function packOnPlaques(items, pW, pH, gap=0){
  const plates=[];
  let remaining=[...items];

  while(remaining.length>0){
    const result=maxRectsPass(remaining, pW, pH, gap);
    if(result.placed.length===0) break;
    plates.push({placed:result.placed, usedLen:pH, plateH:pH});
    remaining=result.notPlaced;
  }
  return {plates};
}

/* ── CALCULATE ── */
function calculate(){
  const pW=parseFloat(document.getElementById('pW').value);
  const pH=parseFloat(document.getElementById('pH').value);
  const gap=Math.max(0,parseFloat(document.getElementById('pGap').value)||0);
  if(!pW||pW<=0){alert('Largeur de plaque invalide');return;}
  if(!pH||pH<=0){alert('Longueur de plaque invalide');return;}
  if(!visuels.length){alert('Ajoutez au moins un visuel');return;}

  const allItems=[];
  visuels.forEach(v=>{
    for(let i=0;i<v.qty;i++)
      allItems.push({vId:v.id,w:v.w,h:v.h,colorIdx:v.colorIdx,name:v.name,idx:i});
  });

  const result=modePlaques(allItems, pW, pH, gap);
  lastResult={plates:result.plates, unplaceable:result.unplaceable, pW, pH, gap};
  renderResults(result.plates, result.unplaceable, pW, pH, gap);
}

/* ── DRAW ── */
function drawPlateToCanvas(plate, pW, pH, gap, canvasW){
  const dispH=pH||plate.usedLen||1;
  const scale=canvasW/pW;
  const cW=canvasW, cH=Math.max(60,Math.round(dispH*scale));
  const RW=38, FH=18;
  const cv=document.createElement('canvas');
  cv.width=cW+RW; cv.height=cH+FH;
  const c=cv.getContext('2d');

  const col={bg:'#fff',strip:'#f7f9fd',grid:'#dde5f4',
    border:'#c8d6ef',rBg:'#f0f4fb',rLine:'#dde5f4',
    tick:'#8096bb',lbl:'#a0b0cc',fBg:'rgba(240,244,251,.95)',fTxt:'#8096bb'};

  c.fillStyle=col.bg; c.fillRect(0,0,cv.width,cv.height);
  c.fillStyle=col.strip; c.fillRect(0,0,cW,cH);

  // Grille 100mm
  const gs=100*scale;
  c.strokeStyle=col.grid; c.lineWidth=0.5;
  for(let x=gs;x<cW;x+=gs){c.beginPath();c.moveTo(x,0);c.lineTo(x,cH);c.stroke();}
  for(let y=gs;y<cH;y+=gs){c.beginPath();c.moveTo(0,y);c.lineTo(cW,y);c.stroke();}

  // Items
  plate.placed.forEach(p=>{
    // Coordonnées et dimensions réelles (sans gap) pour l'affichage
    const rw=p.realW??p.w, rh=p.realH??p.h;
    const sx=p.x*scale, sy=p.y*scale;
    const sw=rw*scale, sh=rh*scale;
    const pc=PDF_COLORS[p.item.colorIdx];

    // Zone de gap (fond hachuré léger)
    if(gap>0){
      const gw=p.w*scale, gh=p.h*scale;
      c.fillStyle='rgba(200,214,239,0.18)';
      c.fillRect(sx,sy,gw,gh);
    }

    c.fillStyle=pc.fill; c.fillRect(sx+1,sy+1,sw-2,sh-2);
    c.strokeStyle=pc.stroke; c.lineWidth=1; c.setLineDash([]);
    c.strokeRect(sx+1.5,sy+1.5,sw-3,sh-3);
    if(p.rot){
      c.strokeStyle='rgba(0,0,0,.1)';
      c.lineWidth=0.5; c.setLineDash([2,2]);
      c.beginPath();c.moveTo(sx+2,sy+2);c.lineTo(sx+sw-2,sy+sh-2);c.stroke();
      c.setLineDash([]);
    }
    if(sw>18&&sh>12){
      const fs=Math.max(6,Math.min(9,Math.round(Math.min(sw,sh)*.15)));
      c.fillStyle=pc.stroke;
      c.font=`bold ${fs}px Arial,sans-serif`;
      c.textAlign='center';c.textBaseline='middle';
      const lbl=sw>55&&sh>20?p.item.name+(p.rot?' R':''):`${p.item.idx+1}`;
      c.save();c.beginPath();c.rect(sx+2,sy+2,sw-4,sh-4);c.clip();
      c.fillText(lbl,sx+sw/2,sy+sh/2);c.restore();
    }
  });

  c.strokeStyle=col.border;c.lineWidth=1;c.setLineDash([]);
  c.strokeRect(.5,.5,cW-1,cH-1);

  // Règle
  const rx=cW+2;
  c.fillStyle=col.rBg; c.fillRect(rx,0,RW-2,cH);
  c.strokeStyle=col.rLine;c.lineWidth=1;
  c.beginPath();c.moveTo(rx,0);c.lineTo(rx,cH);c.stroke();
  const ts=Math.max(100,Math.ceil((dispH/8)/100)*100);
  c.font='7px Arial,sans-serif';
  for(let mm=0;mm<=dispH;mm+=ts){
    const ty=Math.round(mm*scale);if(ty>cH)break;
    c.fillStyle=col.rLine;c.fillRect(rx,ty,4,1);
    c.fillStyle=col.lbl;
    c.save();c.translate(rx+RW-4,ty);c.rotate(-Math.PI/2);c.textAlign='center';c.fillText(mm,0,0);c.restore();
  }
  c.save();c.translate(rx+RW-4,cH-2);c.rotate(-Math.PI/2);
  c.textAlign='center';c.fillStyle=col.tick;c.font='7px Arial,sans-serif';
  c.fillText(dispH+'mm',0,0);c.restore();

  c.fillStyle=col.fBg;c.fillRect(0,cH,cW,FH);
  c.fillStyle=col.fTxt;c.font='7px Arial,sans-serif';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText(`← ${pW} mm →`,cW/2,cH+FH/2);

  return cv;
}

function drawAllPlates(plates, pW, pH, gap, containerId){
  const area=document.getElementById(containerId);
  const availW=area.clientWidth||340;
  const canvasW=Math.max(180, Math.min(340, availW-20));
  plates.forEach((plate,pi)=>{
    const cv=drawPlateToCanvas(plate,pW,pH,gap,canvasW);
    const wrap=document.createElement('div');
    const lbl=document.createElement('div');
    lbl.style.cssText='font-family:IBM Plex Mono,monospace;font-size:8px;color:var(--muted2);letter-spacing:1px;margin-bottom:5px;text-transform:uppercase;font-weight:300;';
    const plateUsedM2=(plate.placed.reduce((a,r)=>a+r.realW*r.realH,0)/1e6).toFixed(3);
    lbl.textContent=`Plaque ${pi+1}/${plates.length} — ${pW}×${pH} mm — ${plate.placed.length} visuel(s) — ${plateUsedM2} m² utilisé`;
    wrap.appendChild(lbl);wrap.appendChild(cv);
    area.appendChild(wrap);
  });
}

      doc.setTextColor(...C.text);doc.setFontSize(6);doc.setFont('helvetica','normal');
      doc.text(`${info.name} (×${info.count})`,lx+7,ly);ly+=5.5;
    });

    // Stats plaque
    const pl=plates[pi];
    const sU=pl.placed.reduce((a,r)=>a+r.w*r.h,0);
    const sT=plateArea;
    const sE=sT>0?Math.round(sU/sT*100):0;
    // Pied bleu
    doc.setFillColor(...C.accentLight);doc.setDrawColor(...C.border);doc.setLineWidth(0.3);
    doc.rect(0,PH-8,PW,8,'FD');
    doc.setTextColor(...C.muted);doc.setFontSize(6);doc.setFont('helvetica','normal');
    doc.text(`Rendement : ${sE}%  ·  Utilisé : ${(sU/1e6).toFixed(3)} m²  ·  Perte : ${((sT-sU)/1e6).toFixed(3)} m²`,M,PH-3);
    doc.text(`Page ${pi+2} / ${plates.length+1}`,PW-M,PH-3,{align:'right'});
  }
  doc.save('calculateur-plaques.pdf');
  btn.textContent='⬇ Export PDF';btn.style.opacity='1';
}
